# Configuracion del nombre y puerto
spring.application.name=ventas-service
server.port=8088

# Configuracion de base de datos MySQL (XAMPP)
# Se cambió /w por /db_ventas
spring.datasource.url=jdbc:mysql://localhost:3306/db_ventas?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracion de JPA/Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# Logging estructurado
logging.level.org.springframework.web=INFO
logging.level.com.vetnova=DEBUG
logging.level.org.hibernate=ERROR