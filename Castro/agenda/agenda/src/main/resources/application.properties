# Configuracion del nombre y puerto
spring.application.name=agenda-service
server.port=8086

# Configuracion de base de datos MySQL (Laragon)
spring.datasource.url=jdbc:mysql://localhost:3306/db_agenda?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracion de JPA/Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# Logging estructurado
logging.level.org.springframework.web=INFO
logging.level.com.vetnova=DEBUG
logging.level.org.hibernate=ERROR