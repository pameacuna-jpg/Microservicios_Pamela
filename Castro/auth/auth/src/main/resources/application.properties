# Configuración del nombre y puerto
spring.application.name=auth-service
server.port=8081

# Configuración de base de datos MySQL (CORREGIDA)
spring.datasource.url=jdbc:mysql://localhost:3306/Auth_Service?useSSL=false&serverTimezone=UTC
spring.datasource.username=ADMIN
spring.datasource.password=TuPasswordSeguro123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA/Hibernate para MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.vetnova=DEBUG
logging.level.org.hibernate=ERROR