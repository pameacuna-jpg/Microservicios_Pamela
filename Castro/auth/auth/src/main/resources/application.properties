# Configuración del servidor y nombre de la aplicación
spring.application.name=auth-service
server.port=8081

# Configuración de base de datos MySQL para Auth_Service
spring.datasource.url=jdbc:mysql://localhost:3306/Auth_Service?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# DEJA ESTA LÍNEA VACÍA SI USAS LARAGON POR DEFECTO
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true